# ============================================================
# kube-prometheus-stack — Production Helm Values
# Chart: prometheus-community/kube-prometheus-stack
# Tested: v58.x
# ============================================================

# ────────────────────────────────────────────────────────────
# Global settings
# ────────────────────────────────────────────────────────────
fullnameOverride: "kube-prometheus"
namespaceOverride: "monitoring"

# ────────────────────────────────────────────────────────────
# Prometheus
# ────────────────────────────────────────────────────────────
prometheus:
  enabled: true

  prometheusSpec:
    # Retention & storage
    retention: 15d
    retentionSize: "45GB"
    walCompression: true

    # Resource limits (tune for cluster size)
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi

    # Persistent storage (use your StorageClass)
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

    # Scrape ALL ServiceMonitors and PodMonitors across namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # Enable remote-write for long-term storage (optional — e.g., Thanos / Cortex)
    # remoteWrite:
    #   - url: http://thanos-receive:19291/api/v1/receive

    # External labels for federation / Thanos
    externalLabels:
      cluster: "eks-production"
      region: "us-east-1"

    # Additional scrape config for services using annotation-based discovery
    additionalScrapeConfigs:
      - job_name: "kubernetes-pod-annotations"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

      # Sample service — explicit job
      - job_name: "sample-service"
        static_configs:
          - targets: ["sample-service.default.svc.cluster.local:3000"]
        metrics_path: /metrics

# ────────────────────────────────────────────────────────────
# Alertmanager
# ────────────────────────────────────────────────────────────
alertmanager:
  enabled: true

  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

  config:
    global:
      resolve_timeout: 5m
      # Slack webhook — set via k8s secret or env var in prod
      # slack_api_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"

    templates:
      - "/etc/alertmanager/config/*.tmpl"

    route:
      group_by: ["alertname", "cluster", "namespace", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "default-receiver"
      routes:
        - match:
            severity: critical
          receiver: "pagerduty-critical"
          continue: true
        - match:
            severity: warning
          receiver: "slack-warnings"

    receivers:
      - name: "default-receiver"
        slack_configs:
          - api_url: "https://hooks.slack.com/services/REPLACE_ME"
            channel: "#alerts"
            title: '{{ template "slack.default.title" . }}'
            text: '{{ template "slack.default.text" . }}'
            send_resolved: true

      - name: "pagerduty-critical"
        pagerduty_configs:
          - routing_key: "REPLACE_WITH_PAGERDUTY_KEY"
            description: '{{ template "pagerduty.default.description" . }}'
            send_resolved: true

      - name: "slack-warnings"
        slack_configs:
          - api_url: "https://hooks.slack.com/services/REPLACE_ME"
            channel: "#alerts-warning"
            send_resolved: true

    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ["alertname", "namespace"]

# ────────────────────────────────────────────────────────────
# Grafana
# ────────────────────────────────────────────────────────────
grafana:
  enabled: true

  # Expose via LoadBalancer
  service:
    type: LoadBalancer
    port: 80

  # Use a k8s secret for admin password in production
  adminPassword: "CHANGE_ME_IN_PRODUCTION"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: true
    storageClassName: gp3
    size: 10Gi

  # Grafana.ini overrides
  grafana.ini:
    server:
      domain: grafana.example.com
      root_url: "https://grafana.example.com"
    security:
      disable_initial_admin_creation: false
      cookie_secure: true
      strict_transport_security: true
    auth.anonymous:
      enabled: false
    log:
      level: warn

  # Data sources — Prometheus is auto-wired; add Loki & Tempo here
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.logging.svc.cluster.local:80
      access: proxy
      isDefault: false
      jsonData:
        derivedFields:
          - datasourceUid: tempo
            matcherRegex: '"trace_id":"(\w+)"'
            name: TraceID
            url: "$${__value.raw}"
    - name: Tempo
      type: tempo
      url: http://tempo.tracing.svc.cluster.local:3100
      access: proxy
      isDefault: false
      uid: tempo
      jsonData:
        httpMethod: GET
        serviceMap:
          datasourceUid: prometheus

  # Dashboard provisioning — maps to ConfigMaps with label grafana_dashboard: "1"
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "golden-signals"
          orgId: 1
          folder: "SRE"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/golden-signals

  # Community dashboards
  dashboards:
    default:
      kubernetes-cluster-monitoring:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      kubernetes-pods:
        gnetId: 6417
        revision: 1
        datasource: Prometheus
      kubernetes-nodes:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      loki-logs:
        gnetId: 13639
        revision: 2
        datasource: Loki

# ────────────────────────────────────────────────────────────
# Node Exporter
# ────────────────────────────────────────────────────────────
nodeExporter:
  enabled: true

prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ────────────────────────────────────────────────────────────
# Kube-state-metrics
# ────────────────────────────────────────────────────────────
kube-state-metrics:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ────────────────────────────────────────────────────────────
# Default PrometheusRules (keep built-in Kubernetes alerts)
# ────────────────────────────────────────────────────────────
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8sContainerCpuUsageSecondsTotal: true
    k8sContainerMemoryCache: true
    k8sPodOwner: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: false        # Disable if using Cilium/eBPF
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
