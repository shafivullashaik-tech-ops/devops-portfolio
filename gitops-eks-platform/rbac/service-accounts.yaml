---
# =============================================================================
# SERVICE ACCOUNTS — One per workload, following IRSA least-privilege
# =============================================================================
# Each application gets its own ServiceAccount with:
#   - Dedicated RBAC permissions (no sharing)
#   - IRSA annotation for pod-level AWS IAM permissions
#   - automountServiceAccountToken: false where not needed
# =============================================================================

###############################################################################
# NAMESPACE: llmops
###############################################################################

# LLM Gateway — ServiceAccount with IRSA for S3/Secrets Manager access
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-gateway
  namespace: llmops
  labels:
    app.kubernetes.io/name: llm-gateway
    app.kubernetes.io/component: ai-service
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    # IRSA: maps to AWS IAM role that allows S3 + Secrets Manager access
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/llm-gateway-irsa-role"
    description: "ServiceAccount for LLM Gateway — IRSA for S3 model storage & Secrets Manager"
automountServiceAccountToken: true

---
# Role for llm-gateway: can read its own ConfigMaps and Secrets in llmops
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: llm-gateway-role
  namespace: llmops
  labels:
    rbac.devops-portfolio.io/managed-by: "gitops"
    app.kubernetes.io/component: "llm-gateway"
  annotations:
    description: "LLM Gateway can read its own config/secrets, nothing else"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["llm-gateway-config"]
    verbs: ["get", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["llm-gateway-secrets", "llm-api-key"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: llm-gateway-rolebinding
  namespace: llmops
  labels:
    rbac.devops-portfolio.io/managed-by: "gitops"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: llm-gateway-role
subjects:
  - kind: ServiceAccount
    name: llm-gateway
    namespace: llmops

---
###############################################################################
# NAMESPACE: default (demo-app)
###############################################################################

# Demo App — minimal ServiceAccount, no AWS access needed
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-app
  namespace: default
  labels:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/component: microservice
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    description: "ServiceAccount for demo Node.js app — no AWS permissions needed"
# No AWS access needed — no IRSA annotation
automountServiceAccountToken: false  # Least privilege: don't mount token unless needed

---
# Role for demo-app: can only read its own ConfigMap
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-app-role
  namespace: default
  labels:
    rbac.devops-portfolio.io/managed-by: "gitops"
    app.kubernetes.io/component: "demo-app"
  annotations:
    description: "Demo app can only read its own ConfigMap"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["demo-app-config"]
    verbs: ["get", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-app-rolebinding
  namespace: default
  labels:
    rbac.devops-portfolio.io/managed-by: "gitops"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: demo-app-role
subjects:
  - kind: ServiceAccount
    name: demo-app
    namespace: default

---
###############################################################################
# NAMESPACE: jenkins
###############################################################################

# Jenkins ServiceAccount with IRSA for ECR push + EKS access
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins
  namespace: jenkins
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/component: cicd
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    # IRSA: ECR push, EKS describe, S3 artifact storage
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/jenkins-irsa-role"
    description: "Jenkins ServiceAccount — IRSA for ECR push, EKS cluster access, S3 artifacts"
automountServiceAccountToken: true

---
# Jenkins Role: can manage workloads in jenkins namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-role
  namespace: jenkins
  labels:
    rbac.devops-portfolio.io/managed-by: "gitops"
    app.kubernetes.io/component: "jenkins"
  annotations:
    description: "Jenkins can fully manage its own namespace for agent pods"
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log", "pods/portforward"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-rolebinding
  namespace: jenkins
  labels:
    rbac.devops-portfolio.io/managed-by: "gitops"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jenkins-role
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: jenkins

---
###############################################################################
# NAMESPACE: argocd
###############################################################################

# ArgoCD Image Updater — reads image tags from ECR
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-image-updater
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater
    app.kubernetes.io/component: gitops
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/argocd-image-updater-irsa-role"
    description: "ArgoCD Image Updater — IRSA for ECR read to auto-update image tags"
automountServiceAccountToken: true

---
###############################################################################
# NAMESPACE: monitoring
###############################################################################

# Prometheus ServiceAccount (created by Helm, but we define the IRSA binding)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    # IRSA: Write metrics to S3 for long-term storage (Thanos/Cortex pattern)
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/prometheus-irsa-role"
    description: "Prometheus — IRSA for S3 metrics storage (long-term retention)"
automountServiceAccountToken: true

---
# Loki ServiceAccount with IRSA for S3 log storage
apiVersion: v1
kind: ServiceAccount
metadata:
  name: loki
  namespace: monitoring
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/component: logging
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/loki-irsa-role"
    description: "Loki — IRSA for S3 log chunks storage"
automountServiceAccountToken: true
