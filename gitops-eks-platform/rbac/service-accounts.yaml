---
# =============================================================================
# SERVICE ACCOUNTS — One per workload, following IRSA least-privilege
# =============================================================================
# Each application gets its own ServiceAccount with:
#   - Dedicated RBAC permissions (no sharing)
#   - IRSA annotation for pod-level AWS IAM permissions
#   - automountServiceAccountToken: false where not needed
# =============================================================================

# NOTE: llm-gateway ServiceAccount is managed by the llm-gateway app (llmops-rag-gateway/k8s/deployment.yaml)
# NOTE: demo-app ServiceAccount is managed by the demo-app Helm chart
# Defining them here causes SharedResourceWarning (owned by 2 apps)
# Platform-rbac only manages CLUSTER-LEVEL RBAC (ClusterRoles + ClusterRoleBindings)

---
###############################################################################
# NAMESPACE: jenkins
###############################################################################

# Jenkins ServiceAccount with IRSA for ECR push + EKS access
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins
  namespace: jenkins
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/component: cicd
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    # IRSA: ECR push, EKS describe, S3 artifact storage
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/jenkins-irsa-role"
    description: "Jenkins ServiceAccount — IRSA for ECR push, EKS cluster access, S3 artifacts"
automountServiceAccountToken: true

---
# Jenkins Role: can manage workloads in jenkins namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-role
  namespace: jenkins
  labels:
    rbac.devops-portfolio.io/managed-by: "gitops"
    app.kubernetes.io/component: "jenkins"
  annotations:
    description: "Jenkins can fully manage its own namespace for agent pods"
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log", "pods/portforward"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-rolebinding
  namespace: jenkins
  labels:
    rbac.devops-portfolio.io/managed-by: "gitops"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jenkins-role
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: jenkins

---
###############################################################################
# NAMESPACE: argocd
###############################################################################

# ArgoCD Image Updater — reads image tags from ECR
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-image-updater
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater
    app.kubernetes.io/component: gitops
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/argocd-image-updater-irsa-role"
    description: "ArgoCD Image Updater — IRSA for ECR read to auto-update image tags"
automountServiceAccountToken: true

---
###############################################################################
# NAMESPACE: monitoring
###############################################################################

# Prometheus ServiceAccount (created by Helm, but we define the IRSA binding)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    # IRSA: Write metrics to S3 for long-term storage (Thanos/Cortex pattern)
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/prometheus-irsa-role"
    description: "Prometheus — IRSA for S3 metrics storage (long-term retention)"
automountServiceAccountToken: true

---
# Loki ServiceAccount with IRSA for S3 log storage
apiVersion: v1
kind: ServiceAccount
metadata:
  name: loki
  namespace: monitoring
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/component: logging
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/loki-irsa-role"
    description: "Loki — IRSA for S3 log chunks storage"
automountServiceAccountToken: true
