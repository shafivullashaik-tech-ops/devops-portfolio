---
# =============================================================================
# aws-auth ConfigMap — REFERENCE ONLY — NOT MANAGED BY ARGOCD
# =============================================================================
# ⚠️  DO NOT apply this file via kubectl or ArgoCD.
#
# aws-auth is managed by Terraform access_entries:
#   aws-platform-infra/terraform/environments/dev/main.tf
#
# Why Terraform owns aws-auth (not GitOps):
#   - aws-auth contains the node group IAM role that allows nodes to join
#   - If ArgoCD overwrites it with wrong/placeholder values → nodes go NotReady
#   - Terraform applies it BEFORE ArgoCD starts, ensuring nodes always work
#
# The kustomization.yaml in this folder intentionally EXCLUDES this file.
# ArgoCD platform-rbac app ignores aws-auth via ignoreDifferences.
#
# To add a new user/role to aws-auth:
#   1. Add to Terraform access_entries in dev/main.tf
#   2. Run: cd aws-platform-infra/terraform/environments/dev && terraform apply
#
# AWS Account: 050451393596
# Cluster: portfolio-eks-dev
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-auth
  namespace: kube-system
  labels:
    rbac.devops-portfolio.io/managed-by: "terraform"
  annotations:
    description: "REFERENCE ONLY. Managed by Terraform. NOT applied by ArgoCD."
data:
  mapRoles: |
    # Node group role — allows EC2 nodes to join EKS cluster
    - rolearn: arn:aws:iam::050451393596:role/portfolio-eks-dev-eks-node-group-role
      username: system:node:{{EC2PrivateDNSName}}
      groups:
        - system:bootstrappers
        - system:nodes

  mapUsers: |
    # Admin user — shafi-terraform (managed via Terraform access_entries)
    - userarn: arn:aws:iam::050451393596:user/shafi-terraform
      username: shafi-terraform
      groups:
        - system:masters
