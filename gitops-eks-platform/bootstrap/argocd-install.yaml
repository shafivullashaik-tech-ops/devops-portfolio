# ArgoCD Installation via Kustomize
# This installs ArgoCD in the argocd namespace

apiVersion: v1
kind: Namespace
metadata:
  name: argocd
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  # ArgoCD stable release
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

patches:
  # Patch to change service type to LoadBalancer (optional)
  - patch: |-
      - op: replace
        path: /spec/type
        value: LoadBalancer
    target:
      kind: Service
      name: argocd-server
