---
# =============================================================================
# HA CONFIGURATION — ResourceQuota + LimitRange (Namespace Guardrails)
# =============================================================================
# NOTE: Deployment topology spread constraints (anti-affinity, topologySpread)
# are defined INSIDE each app's own Helm chart / k8s manifest:
#   - llmops-rag-gateway/k8s/deployment.yaml     ← llm-gateway topology
#   - app-microservice-demo/helm/values.yaml      ← demo-app topology
#
# This file ONLY contains namespace-level resource guardrails:
#   ResourceQuota  → cap total CPU/memory per namespace
#   LimitRange     → set default requests/limits per container
# These do NOT conflict with ArgoCD-managed Deployments.
# =============================================================================

###############################################################################
# RESOURCE QUOTA — llmops namespace
###############################################################################
apiVersion: v1
kind: ResourceQuota
metadata:
  name: llmops-quota
  namespace: llmops
  labels:
    app.kubernetes.io/managed-by: argocd
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    description: "Prevents llmops namespace from consuming all cluster resources"
spec:
  hard:
    requests.cpu: "20"
    requests.memory: "80Gi"
    limits.cpu: "40"
    limits.memory: "160Gi"
    pods: "50"
    services: "20"
    persistentvolumeclaims: "10"
    count/deployments.apps: "20"

---
###############################################################################
# RESOURCE QUOTA — default namespace (demo-app)
###############################################################################
apiVersion: v1
kind: ResourceQuota
metadata:
  name: default-quota
  namespace: default
  labels:
    app.kubernetes.io/managed-by: argocd
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    description: "Prevents default namespace from consuming all cluster resources"
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    pods: "30"
    services: "10"
    count/deployments.apps: "10"

---
###############################################################################
# LIMIT RANGE — llmops namespace
# Sets DEFAULT resource requests/limits for containers that don't specify them
###############################################################################
apiVersion: v1
kind: LimitRange
metadata:
  name: llmops-limitrange
  namespace: llmops
  labels:
    app.kubernetes.io/managed-by: argocd
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    description: "Default resource limits for containers in llmops namespace"
spec:
  limits:
    - type: Container
      default:           # Applied if container doesn't set limits
        cpu: "1"
        memory: "1Gi"
      defaultRequest:    # Applied if container doesn't set requests
        cpu: "100m"
        memory: "256Mi"
      max:               # Hard cap per container
        cpu: "4"
        memory: "8Gi"
      min:               # Minimum allowed
        cpu: "50m"
        memory: "64Mi"

---
###############################################################################
# LIMIT RANGE — default namespace (demo-app)
###############################################################################
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limitrange
  namespace: default
  labels:
    app.kubernetes.io/managed-by: argocd
    rbac.devops-portfolio.io/managed-by: "gitops"
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "50m"
        memory: "64Mi"
      max:
        cpu: "2"
        memory: "2Gi"
      min:
        cpu: "10m"
        memory: "32Mi"

---
###############################################################################
# LIMIT RANGE — monitoring namespace
###############################################################################
apiVersion: v1
kind: LimitRange
metadata:
  name: monitoring-limitrange
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: argocd
    rbac.devops-portfolio.io/managed-by: "gitops"
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "1Gi"
      defaultRequest:
        cpu: "100m"
        memory: "256Mi"
      max:
        cpu: "4"
        memory: "16Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
