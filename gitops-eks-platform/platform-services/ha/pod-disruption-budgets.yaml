---
# =============================================================================
# PodDisruptionBudgets (PDB) — Enterprise High Availability
# =============================================================================
# PDB = "When Kubernetes drains a node (upgrade, Karpenter consolidation),
#         guarantee at least N pods remain running"
#
# Without PDB: Kubernetes could terminate ALL pods of an app during node drain
# With PDB:    Kubernetes must keep minAvailable pods ALWAYS running
#
# Rule of thumb:
#   - 2 replicas → minAvailable: 1  (50% always up)
#   - 3 replicas → minAvailable: 2  (66% always up)
#   - 5+ replicas → maxUnavailable: 1 (only 1 down at a time)
# =============================================================================

###############################################################################
# APPLICATION PDBS
###############################################################################

# LLM Gateway — critical AI service, always keep at least 2 up
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: llm-gateway-pdb
  namespace: llmops
  labels:
    app: llm-gateway
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    description: "LLM Gateway: keep min 2 pods during node drain/upgrade"
spec:
  minAvailable: 2              # Always keep 2 pods running
  selector:
    matchLabels:
      app: llm-gateway

---
# Demo App — keep at least 1 up during maintenance
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: demo-app-pdb
  namespace: default
  labels:
    app: demo-app
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    description: "Demo App: keep min 1 pod during node drain/upgrade"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: demo-app

---
