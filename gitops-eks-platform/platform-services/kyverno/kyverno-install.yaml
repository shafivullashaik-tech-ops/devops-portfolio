---
# =============================================================================
# KYVERNO — Kubernetes-Native Policy Engine
# =============================================================================
# Why Kyverno over OPA Gatekeeper?
#
# OPA Gatekeeper:                    Kyverno:
#   - Requires Rego language           - Pure YAML/K8s resources
#   - Steep learning curve             - Easy to write + read
#   - Validate only                    - VALIDATE + MUTATE + GENERATE
#   - No auto-fix                      - Auto-fix (mutate) pods on admission
#   - Separate ConstraintTemplates     - Single ClusterPolicy resource
#   - Hard to test                     - CLI tool + unit tests
#
# Kyverno = Policy as Code in Kubernetes-native way
# It runs as an admission webhook — policies enforced BEFORE pod starts
#
# Kyverno can:
#   VALIDATE  → Reject pods that don't have resource limits
#   MUTATE    → Auto-add labels/annotations to every pod
#   GENERATE  → Auto-create NetworkPolicy when namespace is created
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  labels:
    app.kubernetes.io/component: "policy"
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    argocd.argoproj.io/sync-wave: "0"   # Install early — before any apps
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno
    chart: kyverno
    targetRevision: "3.1.0"
    helm:
      values: |
        # HA: 3 replicas in HA mode
        admissionController:
          replicas: 3
          podDisruptionBudget:
            minAvailable: 2
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/component: admission-controller
                  topologyKey: kubernetes.io/hostname

        backgroundController:
          replicas: 2
          podDisruptionBudget:
            minAvailable: 1

        cleanupController:
          replicas: 2

        reportsController:
          replicas: 2

        # Kyverno webhook timeout (seconds)
        webhooksCleanupEnabled: true
        webhookAnnotations:
          admissions.enforcer/disabled: "false"

        # Prometheus metrics
        serviceMonitor:
          enabled: true
          namespace: monitoring

        # Resources
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi

        # Failure policy: if Kyverno is down, what happens?
        # Fail = block all admissions (safe but risky during Kyverno outage)
        # Ignore = allow all (safe for availability, less secure)
        webhookFailurePolicy: Fail   # Enterprise: block if policy engine down

        config:
          # Exclude system namespaces from policies
          webhooks:
            - namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: NotIn
                    values:
                      - kube-system
                      - kube-public
                      - kyverno

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
