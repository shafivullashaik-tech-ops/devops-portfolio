---
# =============================================================================
# EXTERNAL SECRETS OPERATOR (ESO) — Secret Management
# =============================================================================
# K8s Secrets are just base64 encoded — not encrypted at rest by default.
# External Secrets Operator:
#   - Pulls secrets FROM AWS Secrets Manager / Parameter Store
#   - Creates K8s Secret objects automatically
#   - Auto-rotates secrets when they change in AWS
#   - Audit trail in AWS CloudTrail
#   - ZERO secrets in Git repo
#
# Flow:
#   AWS Secrets Manager (encrypted) → ESO → K8s Secret → Pod env var
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  labels:
    app.kubernetes.io/component: "secret-management"
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: "0.9.13"
    helm:
      values: |
        replicaCount: 2           # HA: 2 replicas

        # IRSA — ESO needs AWS permissions to read Secrets Manager
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/external-secrets-irsa-role"

        # HA: spread replicas across nodes
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: external-secrets
                  topologyKey: kubernetes.io/hostname

        webhook:
          replicaCount: 2
          certManager:
            enabled: true

        certController:
          replicaCount: 2

        serviceMonitor:
          enabled: true
          namespace: monitoring

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# =============================================================================
# ClusterSecretStore — Connect ESO to AWS Secrets Manager
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    description: "Cluster-wide secret store backed by AWS Secrets Manager"
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets

---
# =============================================================================
# ClusterSecretStore — Connect ESO to AWS Parameter Store (for config)
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-parameter-store
  labels:
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    description: "Cluster-wide secret store backed by AWS SSM Parameter Store"
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-west-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets

---
# =============================================================================
# ExternalSecret — LLM Gateway API Key from Secrets Manager
# =============================================================================
# This replaces hardcoded secrets in K8s Secret manifests.
# ESO pulls from AWS Secrets Manager and creates K8s Secret automatically.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: llm-gateway-secrets
  namespace: llmops
  labels:
    app: llm-gateway
    rbac.devops-portfolio.io/managed-by: "gitops"
  annotations:
    description: "LLM Gateway secrets pulled from AWS Secrets Manager"
spec:
  # Refresh interval — how often ESO checks for updates
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  # The K8s Secret that ESO will CREATE
  target:
    name: llm-gateway-secrets   # This K8s Secret is auto-created
    creationPolicy: Owner        # ESO owns it — deletes if ExternalSecret deleted
    template:
      engineVersion: v2
      metadata:
        labels:
          app: llm-gateway

  data:
    # Pull each field from AWS Secrets Manager
    - secretKey: OPENAI_API_KEY          # Key in K8s Secret
      remoteRef:
        key: devops-portfolio/llm-gateway  # Path in AWS Secrets Manager
        property: openai_api_key           # JSON field in the secret

    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: devops-portfolio/llm-gateway
        property: jwt_secret_key

    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: devops-portfolio/llm-gateway
        property: redis_password

---
# =============================================================================
# ExternalSecret — Jenkins credentials from Secrets Manager
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jenkins-secrets
  namespace: jenkins
  labels:
    app: jenkins
    rbac.devops-portfolio.io/managed-by: "gitops"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: jenkins-credentials
    creationPolicy: Owner
  data:
    - secretKey: jenkins-admin-password
      remoteRef:
        key: devops-portfolio/jenkins
        property: admin_password
    - secretKey: github-token
      remoteRef:
        key: devops-portfolio/jenkins
        property: github_token
    - secretKey: ecr-registry-url
      remoteRef:
        key: devops-portfolio/jenkins
        property: ecr_registry_url
