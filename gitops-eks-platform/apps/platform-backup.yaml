---
# Platform RBAC — ClusterRoles + RoleBindings + ServiceAccounts (from our Git repo)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-rbac
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
  labels:
    app.kubernetes.io/component: "rbac"
spec:
  project: default
  source:
    repoURL: https://github.com/shafivullashaik-tech-ops/devops-portfolio.git
    targetRevision: feature/llmops-rag-gateway
    path: gitops-eks-platform/rbac
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated: {prune: false, selfHeal: true}
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
