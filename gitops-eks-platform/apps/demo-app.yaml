# Demo Application - Managed by ArgoCD

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/shafivullashaik-tech-ops/devops-portfolio.git
    targetRevision: feature/llmops-rag-gateway
    path: app-microservice-demo/helm
    helm:
      releaseName: demo-app
      valueFiles:
        - values.yaml
      values: |
        image:
          repository: 050451393596.dkr.ecr.us-west-2.amazonaws.com/demo-app
          tag: "latest"
          pullPolicy: Always
        service:
          type: LoadBalancer
          port: 3000
        replicaCount: 2
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        env:
          - name: NODE_ENV
            value: development
          - name: LOG_LEVEL
            value: debug

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

  # Health assessment
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas  # Ignore replica changes from HPA
