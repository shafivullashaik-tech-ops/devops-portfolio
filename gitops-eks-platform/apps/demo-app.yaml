# Demo Application - Managed by ArgoCD

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    # Source 1: Helm chart
    - repoURL: https://github.com/shafivullashaik-tech-ops/devops-portfolio.git
      targetRevision: feature/llmops-rag-gateway
      path: app-microservice-demo/helm
      helm:
        releaseName: demo-app
        valueFiles:
          - $values/gitops-eks-platform/environments/dev/values.yaml

    # Source 2: Values files from Git repo (referenced as $values above)
    - repoURL: https://github.com/shafivullashaik-tech-ops/devops-portfolio.git
      targetRevision: feature/llmops-rag-gateway
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

  # Health assessment
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas  # Ignore replica changes from HPA
