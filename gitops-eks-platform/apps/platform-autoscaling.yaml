---
# KEDA — Event-Driven Pod Autoscaler (installs from Helm chart repo)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
  labels:
    app.kubernetes.io/component: "pod-autoscaling"
spec:
  project: default
  source:
    repoURL: https://kedacore.github.io/charts
    chart: keda
    targetRevision: "2.13.0"
    helm:
      values: |
        operator:
          replicaCount: 1
        metricsServer:
          replicaCount: 1
        webhooks:
          replicaCount: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: keda
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers: [/webhooks]

---
# VPA — Vertical Pod Autoscaler (installs from Helm chart repo)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vpa
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
  labels:
    app.kubernetes.io/component: "vertical-autoscaling"
spec:
  project: default
  source:
    repoURL: https://charts.fairwinds.com/stable
    chart: vpa
    targetRevision: "3.0.0"
    helm:
      values: |
        recommender:
          replicaCount: 1
        updater:
          replicaCount: 1
        admissionController:
          replicaCount: 1
          generateCertificate: true
  destination:
    server: https://kubernetes.default.svc
    namespace: vpa
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true]

---
# Karpenter — Node Autoscaler (installs from Helm chart repo)
# NOTE: Karpenter requires IRSA + SQS interruption queue pre-configured
# For dev: skip node pools (Karpenter manages nodes via EC2 API)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
  labels:
    app.kubernetes.io/component: "node-autoscaling"
spec:
  project: default
  source:
    repoURL: oci://public.ecr.aws/karpenter/karpenter
    chart: karpenter
    targetRevision: "1.3.3"
    helm:
      values: |
        replicas: 1
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: "arn:aws:iam::050451393596:role/portfolio-eks-dev-karpenter-irsa"
        settings:
          clusterName: "portfolio-eks-dev"
          clusterEndpoint: "https://0CACF9AA3BAFCF5A367ECCFCA23EE436.gr7.us-west-2.eks.amazonaws.com"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true]

---
# Platform HA — PodDisruptionBudgets + ResourceQuotas (from our Git repo)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-ha
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
  labels:
    app.kubernetes.io/component: "high-availability"
spec:
  project: default
  source:
    repoURL: https://github.com/shafivullashaik-tech-ops/devops-portfolio.git
    targetRevision: feature/llmops-rag-gateway
    path: gitops-eks-platform/platform-services/ha
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true]
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers: [/spec/replicas]
