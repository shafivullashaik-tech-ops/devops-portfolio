---
# HA Configs — PDBs and Topology Spread
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-ha
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
  labels:
    app.kubernetes.io/component: "high-availability"
spec:
  project: default
  source:
    repoURL: https://github.com/shafivullashaik-tech-ops/devops-portfolio.git
    targetRevision: feature/llmops-rag-gateway
    path: gitops-eks-platform/platform-services/ha
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true]
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers: [/spec/replicas]
