# ArgoCD App-of-Apps entry for LLM Gateway
# Enterprise pattern: KEDA ScaledObject manages HPA lifecycle
# ArgoCD ignoreDifferences prevents conflict with KEDA-managed HPA

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llm-gateway
  namespace: argocd
  labels:
    team: platform
    app: llm-gateway
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/shafivullashaik-tech-ops/devops-portfolio.git
    targetRevision: feature/llmops-rag-gateway
    path: llmops-rag-gateway/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: llmops

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    # Ignore replica count changes (KEDA ScaledObject manages replicas)
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    # Enterprise pattern: KEDA owns the HPA lifecycle
    # KEDA creates HPA named 'keda-hpa-<scaledobject-name>' or same name
    # ArgoCD must NOT prune/recreate HPAs managed by KEDA
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      namespace: llmops
      jqPathExpressions:
        - .
