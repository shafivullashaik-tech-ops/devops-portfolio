# =============================================================================
# ArgoCD Application — LLM Gateway
# Enterprise Pattern: KEDA ScaledObject manages HPA lifecycle
# ArgoCD ignoreDifferences prevents conflict with KEDA-managed resources
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llm-gateway
  namespace: argocd
  labels:
    team: platform
    app: llm-gateway
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/shafivullashaik-tech-ops/devops-portfolio.git
    targetRevision: feature/llmops-rag-gateway
    path: llmops-rag-gateway/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: llmops

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    # Ignore replica count — KEDA ScaledObject manages replicas
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    # Enterprise KEDA pattern: KEDA creates and owns the HPA
    # ArgoCD must NOT delete/recreate HPAs managed by KEDA ScaledObject
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      namespace: llmops
      jqPathExpressions:
        - .
