# =============================================================================
# Grafana Dashboard ConfigMap — LLM Gateway
#
# This matches EXACTLY the pattern used in:
#   sre-observability-stack/monitoring/dashboards/golden-signals-configmap.yaml
#
# The Grafana sidecar (already running in kube-prometheus-stack) auto-imports
# any ConfigMap with label: grafana_dashboard: "1"
#
# Apply: kubectl apply -f k8s/grafana-dashboard-configmap.yaml
# The dashboard appears in Grafana → Dashboards → LLMOps folder automatically.
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-gateway-dashboard
  namespace: monitoring          # Must be in the monitoring namespace (where Grafana sidecar scans)
  labels:
    grafana_dashboard: "1"       # Required label — matches sidecar.dashboards.label in kube-prometheus-stack values.yaml
    app: llm-gateway
    team: platform
data:
  llm-gateway.json: |
    {
      "annotations": { "list": [] },
      "description": "LLM Gateway — Token Usage · Request Latency · Guardrails · Cost",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "🚦 Request Traffic",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "reqps" },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "id": 2,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(llm_request_total[1m])) by (route)",
              "legendFormat": "{{ route }}",
              "refId": "A"
            }
          ],
          "title": "Request Rate (req/s) by Route",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "s" },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "id": 3,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(llm_request_latency_seconds_bucket[5m])) by (le, route))",
              "legendFormat": "p95 {{ route }}",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(llm_request_latency_seconds_bucket[5m])) by (le, route))",
              "legendFormat": "p50 {{ route }}",
              "refId": "B"
            }
          ],
          "title": "Request Latency — p50 / p95",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 10,
          "title": "💰 Token Usage & Cost",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "short" },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 10 },
          "id": 4,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(llm_token_usage_total[5m])) by (model, type)",
              "legendFormat": "{{ model }} / {{ type }}",
              "refId": "A"
            }
          ],
          "title": "Token Usage Rate (tokens/s) by Model",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 100000 },
                { "color": "red", "value": 500000 }
              ]}
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 10 },
          "id": 5,
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "sum(increase(llm_token_usage_total[1h])) by (model)",
              "legendFormat": "{{ model }}",
              "refId": "A"
            }
          ],
          "title": "Total Tokens Last 1h (Cost Proxy)",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "id": 20,
          "title": "🛡️ Guardrails & Security",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "fixed", "fixedColor": "red" }, "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 1 },
                { "color": "red", "value": 10 }
              ]}
            }
          },
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 19 },
          "id": 6,
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "sum(increase(llm_guardrail_blocks_total{block_type=\"injection\"}[5m]))",
              "legendFormat": "Injections Blocked",
              "refId": "A"
            }
          ],
          "title": "Injection Blocks (5m)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "fixed", "fixedColor": "orange" }, "unit": "percentunit",
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 0.01 },
                { "color": "red", "value": 0.05 }
              ]}
            }
          },
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 19 },
          "id": 7,
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "sum(rate(llm_request_total{status=~\"4..|5..\"}[5m])) / sum(rate(llm_request_total[5m]))",
              "legendFormat": "Error Rate",
              "refId": "A"
            }
          ],
          "title": "HTTP Error Rate",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "short" }
          },
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 19 },
          "id": 8,
          "options": { "colorMode": "value", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "sum(rate(llm_request_total{status=\"429\"}[5m]))",
              "legendFormat": "Rate Limited",
              "refId": "A"
            }
          ],
          "title": "Rate Limited Requests/s",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 25 },
          "id": 30,
          "title": "🗄️ Cache & Vector Store",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "percentunit" }
          },
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 26 },
          "id": 9,
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(llm_cache_hits_total[5m])) by (cache_type) / (sum(rate(llm_cache_hits_total[5m])) by (cache_type) + sum(rate(llm_cache_misses_total[5m])) by (cache_type))",
              "legendFormat": "{{ cache_type }} hit rate",
              "refId": "A"
            }
          ],
          "title": "Cache Hit Rate (embedding + response)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "short" }
          },
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 26 },
          "id": 11,
          "options": { "colorMode": "value", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "llm_vector_store_chunks",
              "legendFormat": "Chunks",
              "refId": "A"
            }
          ],
          "title": "Vector Store Size (chunks)",
          "type": "stat"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["llmops", "rag", "gateway", "ai"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "LLM Gateway — Overview",
      "uid": "llm-gateway-v1",
      "version": 1
    }
