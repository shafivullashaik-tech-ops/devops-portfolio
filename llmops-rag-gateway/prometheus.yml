# =============================================================================
# Prometheus scrape configuration for LLM Gateway
# =============================================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: 'local'
    project: 'llmops-rag-gateway'

scrape_configs:

  # LLM Gateway metrics
  - job_name: 'llm-gateway'
    static_configs:
      - targets: ['gateway:8000']
    metrics_path: /metrics
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
