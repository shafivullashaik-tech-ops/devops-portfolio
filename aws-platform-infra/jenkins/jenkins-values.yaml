# Jenkins Helm Chart Values
# Deploys Jenkins on EKS with:
# - Configuration as Code (JCasC) - auto-configures pipeline
# - IRSA for secure AWS access (no hardcoded credentials)
# - Kubernetes plugin for dynamic build agents
# - Pre-installed plugins

controller:
  # Resource allocation
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

  # Service configuration
  serviceType: LoadBalancer
  servicePort: 8080
  agentListenerPort: 50000

  # Jenkins Java options
  javaOpts: "-Xms512m -Xmx1024m -Djenkins.install.runSetupWizard=false"

  # Admin credentials (change in production!)
  admin:
    username: "admin"
    password: "Admin@1234!"

  # Plugins to install
  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - git:latest
    - configuration-as-code:latest
    - docker-workflow:latest
    - amazon-ecr:latest
    - pipeline-aws:latest
    - blueocean:latest
    - credentials:latest
    - credentials-binding:latest
    - plain-credentials:latest
    - ssh-credentials:latest
    - github:latest
    - github-branch-source:latest
    - slack:latest
    - build-timeout:latest
    - timestamper:latest
    - ws-cleanup:latest
    - pipeline-stage-view:latest
    - prometheus:latest
    - job-dsl:latest

  # Configuration as Code - auto-configures Jenkins
  JCasC:
    defaultConfig: true
    configScripts:
      welcome-message: |
        jenkins:
          systemMessage: "DevOps Portfolio Jenkins - Managed by Terraform & Helm"

      kubernetes-cloud: |
        jenkins:
          clouds:
            - kubernetes:
                name: "kubernetes"
                serverUrl: "https://kubernetes.default.svc.cluster.local"
                namespace: "jenkins"
                jenkinsUrl: "http://jenkins:8080"
                jenkinsTunnel: "jenkins-agent:50000"
                connectTimeout: 5
                readTimeout: 15
                containerCapStr: "10"
                maxRequestsPerHostStr: "32"
                templates:
                  - name: "default"
                    label: "jenkins-agent"
                    nodeUsageMode: NORMAL
                    containers:
                      - name: "jnlp"
                        image: "jenkins/inbound-agent:latest"
                        resourceRequestCpu: "200m"
                        resourceRequestMemory: "256Mi"
                        resourceLimitCpu: "500m"
                        resourceLimitMemory: "512Mi"
                    volumes:
                      - hostPathVolume:
                          hostPath: "/var/run/docker.sock"
                          mountPath: "/var/run/docker.sock"

      pipeline-config: |
        jobs:
          - script: >
              multibranchPipelineJob('demo-app') {
                branchSources {
                  github {
                    id('demo-app-source')
                    scanCredentialsId('github-credentials')
                    repoOwner('shafivullashaik-tech-ops')
                    repository('devops-portfolio')
                    buildForkPRHead(false)
                    buildForkPRMerge(false)
                    buildOriginBranch(true)
                    buildOriginBranchWithPR(false)
                    buildOriginPRHead(false)
                    buildOriginPRMerge(true)
                  }
                }
                factory {
                  workflowBranchProjectFactory {
                    scriptPath('app-microservice-demo/Jenkinsfile')
                  }
                }
                orphanedItemStrategy {
                  discardOldItems {
                    numToKeep(5)
                  }
                }
                triggers {
                  periodic(5)
                }
              }

  # Service Account for IRSA
  serviceAccount:
    create: true
    name: "jenkins"
    annotations:
      # This annotation links the K8s service account to the IAM role
      # Replace with actual IRSA role ARN after terraform apply
      eks.amazonaws.com/role-arn: "arn:aws:iam::050451393596:role/portfolio-eks-dev-jenkins-irsa"

  # Liveness and readiness probes
  healthProbes: true
  livenessProbe:
    httpGet:
      path: /login
      port: 8080
    initialDelaySeconds: 90
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5

  readinessProbe:
    httpGet:
      path: /login
      port: 8080
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  # Prometheus metrics - uncomment after monitoring stack (kube-prometheus-stack) is deployed
  # prometheus:
  #   enabled: true
  #   serviceMonitorNamespace: "monitoring"
  #   serviceMonitorAdditionalLabels:
  #     release: kube-prometheus-stack

# Persistent storage for Jenkins home
persistence:
  enabled: true
  storageClass: "gp2"
  size: "20Gi"
  accessMode: ReadWriteOnce

# Agent configuration
agent:
  enabled: true
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# RBAC configuration
rbac:
  create: true
  readSecrets: true

# Security context
securityContext:
  runAsUser: 1000
  fsGroup: 1000

# Network policy
networkPolicy:
  enabled: false
